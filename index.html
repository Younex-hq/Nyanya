<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro Web App</title>
    <meta name="theme-color" content="#0f172a">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/styles/vars.css" />
    <link rel="stylesheet" href="./src/styles/main.css" />
    <link rel="stylesheet" href="./src/styles/timer.css" />
    <link rel="stylesheet" href="./src/styles/stats.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Pomodoro</h1>
        <button id="btn-stats-toggle" class="btn-icon" aria-label="Open Statistics">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </header>

      <main>
        <section id="timer-section">
          <!-- Timer UI goes here via JS -->
        </section>
      </main>

      <!-- Modal for tags -->
      <div id="tags-wrapper-modal" class="modal hidden">
        <div class="modal-content" style="max-width: 800px;">
          <button id="btn-close-tags" class="close-button">&times;</button>
          <section id="tags-section">
            <!-- Tags Manager UI goes here via JS -->
          </section>
        </div>
      </div>
      
      <!-- Modal for statistics -->
      <div id="stats-modal" class="modal hidden">
        <div class="modal-content stats-dashboard">
          <button id="btn-close-stats" class="close-button">&times;</button>
          <h2>Statistics</h2>
          <div id="stats-container">
            <!-- Stats UI gets injected here -->
          </div>
        </div>
      </div>
    </div>
    
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
